<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma STEAM — Cadeira de Rodas para Cães</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --border: #e2e0db;
      --border-strong: #ccc9c0;
      --text: #1c1c1c;
      --text-dim: #888580;
      --accent: #3d6fa8;
      --cell-w: 36px;
      --row-h: 42px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body.dark {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #2e2e2e;
      --border-strong: #444;
      --text: #e8e6e0;
      --text-dim: #666;
      --accent: #6b9fd4;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px 14px;
      display: flex;
      align-items: flex-start;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .header-left { flex: 1; min-width: 280px; }
    .project-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .project-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    .project-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .progress-track { height: 5px; border-radius: 3px; background: var(--border); width: 160px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
    .progress-label { font-size: 11px; font-weight: 600; color: var(--accent); }
    .progress-count { font-size: 11px; color: var(--text-dim); }

    .header-right {}
    .legend-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    .legend { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .legend-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600; color: #fff;
      user-select: none;
    }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 28px;
      display: flex;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: var(--header-h, 104px);
      z-index: 99;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 6px;
      font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg); }
    .btn-danger:hover { color: #c0392b; border-color: #c0392b; }
    .toolbar-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      text-wrap: pretty;
    }

    /* ── TABLE WRAPPER ── */
    .table-outer { overflow-x: auto; overflow-y: auto; height: calc(100vh - var(--sticky-offset, 148px)); }
    .gantt-table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: max-content;
    }
    .gantt-table th,
    .gantt-table td {
      border-bottom: 1px solid var(--border);
    }

    /* Sticky left columns */
    .col-check  { width: 40px; min-width: 40px; position: sticky; left: 0;   z-index: 6; }
    .col-task   { width: 300px; min-width: 300px; position: sticky; left: 40px; z-index: 6; }
    .col-members{ width: 168px; min-width: 168px; position: sticky; left: 340px; z-index: 6; border-right: 2px solid var(--border-strong) !important; }

    /* Column headers */
    .th-spacer { background: var(--surface); }
    .th-month-cell {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-dim); padding: 8px 0 2px; text-align: center;
      background: var(--surface);
      position: sticky; top: 0; z-index: 8;
    }
    .th-month-cell.vac-month { color: #c0973a; }
    .th-week-cell {
      font-size: 10px; font-weight: 400; color: var(--text-dim);
      padding: 2px 0 7px; text-align: center;
      width: var(--cell-w); min-width: var(--cell-w);
      background: var(--surface);
      white-space: nowrap;
      position: sticky; top: 28px; z-index: 8;
    }
    .th-week-cell.vacation { background: #fdf7ed; color: #c0973a; }
    body.dark .th-week-cell.vacation { background: #211e17; }
    .th-week-cell.today-col { color: var(--accent); font-weight: 700; }
    .th-left-cell {
      padding: 8px 10px 7px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-dim);
      background: var(--surface);
      position: sticky; top: 0; z-index: 12;
    }
    .th-spacer { position: sticky; top: 0; z-index: 12; background: var(--surface); }

    /* Phase header */
    .phase-row td {
      padding: 7px 10px 6px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: rgba(255,255,255,0.9);
    }
    .phase-name-input {
      background: transparent; border: none; outline: none;
      font: inherit; color: inherit; cursor: pointer; width: 100%;
    }
    .phase-name-input:focus { cursor: text; border-bottom: 1px solid rgba(255,255,255,0.5); }

    /* Task rows */
    .task-row { transition: background 0.1s; }
    .task-row:hover { background: rgba(61,111,168,0.04); }
    body.dark .task-row:hover { background: rgba(107,159,212,0.06); }
    .task-row.done .task-name { text-decoration: line-through; color: var(--text-dim); }

    .check-cell {
      text-align: center; padding: 0 6px;
      vertical-align: middle; cursor: pointer;
      background: var(--surface);
    }
    .check-cell input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: var(--accent); margin: 0;
    }
    .name-cell { padding: 8px 8px; background: var(--surface); vertical-align: middle; }
    .name-row { display: flex; align-items: center; gap: 4px; }
    .task-name {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
      cursor: pointer; padding: 0; line-height: 1.4;
      resize: none; overflow: hidden;
      display: block; width: 100%;
    }
    .task-name:focus { cursor: text; }
    .del-btn {
      opacity: 0; border: none; background: none; cursor: pointer;
      color: var(--text-dim); font-size: 13px; padding: 4px 5px; border-radius: 4px;
      transition: opacity 0.12s, color 0.12s; flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .task-row:hover .del-btn { opacity: 0.4; }
    .del-btn:hover { opacity: 1 !important; color: #c0392b; }

    .members-cell { padding: 0 8px; background: var(--surface); vertical-align: middle; }
    .member-chips { display: flex; flex-wrap: wrap; gap: 3px; padding: 6px 0; }
    .m-chip {
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600; color: #fff;
      cursor: pointer; transition: opacity 0.12s, transform 0.1s;
      user-select: none;
    }
    .m-chip:hover { transform: scale(1.06); }
    .m-chip.off { opacity: 0.15; }

    /* Gantt cells */
    .gantt-cell {
      width: var(--cell-w); min-width: var(--cell-w);
      padding: 0; cursor: crosshair;
      position: relative; min-height: var(--row-h); height: auto;
      vertical-align: middle;
      user-select: none;
    }
    .gantt-cell.vacation {
      background: repeating-linear-gradient(
        135deg,
        transparent, transparent 4px,
        rgba(192,151,58,0.08) 4px, rgba(192,151,58,0.08) 8px
      );
    }
    body.dark .gantt-cell.vacation {
      background: repeating-linear-gradient(
        135deg,
        transparent, transparent 4px,
        rgba(192,151,58,0.12) 4px, rgba(192,151,58,0.12) 8px
      );
    }
    .gantt-cell.today-col::before {
      content: '';
      position: absolute; top: 0; bottom: 0; left: 50%;
      width: 2px; transform: translateX(-50%);
      background: var(--accent); opacity: 0.3; pointer-events: none;
    }
    .gantt-bar {
      position: absolute;
      top: 8px; bottom: 8px;
      left: 2px; right: 2px;
      border-radius: 3px;
      pointer-events: none;
    }
    .gantt-bar.bar-start { left: 6px; border-radius: 8px 3px 3px 8px; }
    .gantt-bar.bar-end   { right: 6px; border-radius: 3px 8px 8px 3px; }
    .gantt-bar.bar-alone { left: 6px; right: 6px; border-radius: 8px; }
    .gantt-bar.is-done   { opacity: 0.35; }
    .gantt-bar.is-drag   { opacity: 0.55; }

    /* Vacation label in phase row */
    .vac-label { font-size: 9px; text-align: center; opacity: 0.6; color: #c0973a; }

    /* Add task row */
    .add-row td { padding: 3px 10px 4px; background: var(--surface); }
    .add-btn {
      width: 100%; text-align: left; padding: 5px 8px;
      background: none; border: 1px dashed var(--border);
      border-radius: 5px; font-size: 12px; color: var(--text-dim);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.12s;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(61,111,168,0.04); }

    /* Vacation notice row */
    .vac-row td {
      background: #fdf7ed; text-align: center;
      font-size: 11px; color: #c0973a; padding: 6px 4px; letter-spacing: 0.3px;
    }
    body.dark .vac-row td { background: #211e17; }
    .vac-row .col-check, .vac-row .col-task, .vac-row .col-members { text-align: right; }

    /* Phase gap spacer */
    .gap-row td { height: 4px; background: var(--bg); border: none; }

    @media print {
      .toolbar, .del-btn, .add-btn { display: none !important; }
      .table-outer { overflow: visible !important; height: auto !important; }
      .app-header { position: static !important; }
      .th-month-cell, .th-week-cell, .th-left-cell, .th-spacer { position: static !important; }
      body { background: white !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── MEMBERS ───────────────────────────────────────────── */
const MEMBERS = [
  { id: 'bia',     label: 'Bia',     color: '#4a7fc1' },
  { id: 'lia',     label: 'Lia',     color: '#3a9e72' },
  { id: 'gabi',    label: 'Gabi',    color: '#b05ba0' },
  { id: 'manu',    label: 'Manu',    color: '#c07830' },
  { id: 'gabriel', label: 'Gabriel', color: '#b04040' },
];
const memberMap = Object.fromEntries(MEMBERS.map(m => [m.id, m]));

/* ── WEEKS ─────────────────────────────────────────────── */
function buildWeeks() {
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const start = new Date(2026, 3, 24);
  return Array.from({ length: 23 }, (_, i) => {
    const d = new Date(start); d.setDate(d.getDate() + i * 7);
    return {
      n: i + 1,
      label: `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`,
      month: months[d.getMonth()],
      isVacation: d.getMonth() === 6, // julho
      date: new Date(d),
    };
  });
}
const WEEKS = buildWeeks();

function getTodayWeek() {
  const now = new Date();
  for (let i = 0; i < WEEKS.length - 1; i++) {
    if (now >= WEEKS[i].date && now < WEEKS[i+1].date) return WEEKS[i].n;
  }
  if (now >= WEEKS[WEEKS.length-1].date) return WEEKS[WEEKS.length-1].n;
  return null;
}
const TODAY_WEEK = getTodayWeek();

/* ── INITIAL DATA ──────────────────────────────────────── */
let _uid = 300;
const uid = () => `t${_uid++}`;

const INITIAL = [
  { id:'p1', name:'Planejamento e Pesquisa', color:'#3d6fa8', tasks:[
    { id:'t1',  name:'Definição do problema e hipóteses de pesquisa', members:['bia','lia','gabi','manu','gabriel'], s:1, e:2,  done:false },
    { id:'t2',  name:'Pesquisa bibliográfica e revisão de literatura',  members:['bia','lia'],                       s:1, e:3,  done:false },
    { id:'t3',  name:'Análise de projetos similares existentes',        members:['gabi','gabriel'],                  s:2, e:3,  done:false },
    { id:'t4',  name:'Levantamento de materiais, custos e viabilidade', members:['manu','gabriel'],                  s:3, e:4,  done:false },
  ]},
  { id:'p2', name:'Design e Projeto', color:'#3a9e72', tasks:[
    { id:'t5',  name:'Esboços e dimensionamento da cadeira',            members:['gabi','manu'],                     s:4, e:5,  done:false },
    { id:'t6',  name:'Definição e aquisição dos materiais',             members:['gabriel','lia'],                   s:5, e:6,  done:false },
    { id:'t7',  name:'Cálculos estruturais e viabilidade técnica',      members:['gabriel','bia'],                   s:5, e:6,  done:false },
  ]},
  { id:'p3', name:'Construção do Protótipo', color:'#b05ba0', tasks:[
    { id:'t8',  name:'Montagem do protótipo — versão 1',                members:['bia','gabi','gabriel'],             s:7, e:10, done:false },
    { id:'t9',  name:'Registro fotográfico e documentação do processo', members:['lia','manu'],                      s:7, e:10, done:false },
  ]},
  { id:'p4', name:'Testes e Iteração', color:'#c07830', tasks:[
    { id:'t10', name:'Testes de funcionalidade e adaptação',            members:['bia','gabriel','gabi'],             s:15,e:16, done:false },
    { id:'t11', name:'Coleta e análise dos dados',                      members:['lia','manu'],                      s:16,e:17, done:false },
    { id:'t12', name:'Ajustes e melhorias — versão 2',                  members:['gabriel','gabi','bia'],             s:17,e:18, done:false },
  ]},
  { id:'p5', name:'Redação do Artigo Científico', color:'#b04040', tasks:[
    { id:'t13', name:'Introdução, justificativa e objetivos',           members:['bia','lia'],                       s:15,e:17, done:false },
    { id:'t14', name:'Referencial teórico',                             members:['lia','gabi'],                      s:16,e:18, done:false },
    { id:'t15', name:'Metodologia',                                     members:['gabriel','manu'],                  s:18,e:19, done:false },
    { id:'t16', name:'Resultados e discussão',                          members:['bia','gabi','gabriel'],             s:19,e:21, done:false },
    { id:'t17', name:'Revisão, formatação e entrega final',             members:['manu','lia','bia'],                 s:21,e:22, done:false },
  ]},
  { id:'p6', name:'Apresentação Final', color:'#5a5aa0', tasks:[
    { id:'t18', name:'Preparação dos slides e materiais visuais',       members:['gabi','lia','manu'],               s:21,e:22, done:false },
    { id:'t19', name:'Ensaio geral da apresentação',                    members:['bia','lia','gabi','manu','gabriel'],s:22,e:23, done:false },
    { id:'t20', name:'Apresentação final',                              members:['bia','lia','gabi','manu','gabriel'],s:23,e:23, done:false },
  ]},
];

/* ── MONTH GROUPS ──────────────────────────────────────── */
function monthGroups() {
  const groups = [];
  WEEKS.forEach(w => {
    const last = groups[groups.length - 1];
    if (last && last.month === w.month) last.count++;
    else groups.push({ month: w.month, count: 1, isVacation: w.isVacation });
  });
  return groups;
}
const MONTH_GROUPS = monthGroups();

/* ── HELPERS ───────────────────────────────────────────── */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ══════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════════ */
function App() {
  const [phases, setPhases] = useState(() => {
    try { const s = localStorage.getItem('steam-cron-v2'); return s ? JSON.parse(s) : INITIAL; }
    catch { return INITIAL; }
  });
  const [drag, setDrag] = useState(null); // { taskId, anchor, current }
  const dragging = useRef(false);
  const headerRef = useRef(null);
  const toolbarRef = useRef(null);

  useEffect(() => {
    const update = () => {
      const hh = headerRef.current?.offsetHeight || 0;
      const th = toolbarRef.current?.offsetHeight || 0;
      document.documentElement.style.setProperty('--header-h', hh + 'px');
      document.documentElement.style.setProperty('--sticky-offset', (hh + th) + 'px');
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  useEffect(() => {
    const updateCellWidth = () => {
      const outer = document.querySelector('.table-outer');
      if (!outer) return;
      const available = outer.clientWidth - 40 - 300 - 168 - 2;
      const auto = Math.max(28, Math.floor(available / 23));
      const zoom = tweaks?.cellWidth ?? 0;
      document.documentElement.style.setProperty('--cell-w', (auto + zoom) + 'px');
    };
    updateCellWidth();
    window.addEventListener('resize', updateCellWidth);
    return () => window.removeEventListener('resize', updateCellWidth);
  }, [tweaks?.cellWidth]);

  useEffect(() => {
    document.querySelectorAll('textarea.task-name').forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    });
  }, [phases]);

  // Tweaks
  const { TweaksPanel, TweakSection, TweakToggle, TweakSlider, useTweaks } = window;
  const [tweaks, setTweaks] = useTweaks(/*EDITMODE-BEGIN*/{
    "darkMode": false,
    "compactRows": false,
    "showVacation": true,
    "cellWidth": 0
  }/*EDITMODE-END*/);

  useEffect(() => {
    if (!tweaks) return;
    document.body.classList.toggle('dark', tweaks.darkMode);
    document.documentElement.style.setProperty('--row-h', tweaks.compactRows ? '32px' : '42px');
  }, [tweaks]);

  useEffect(() => {
    localStorage.setItem('steam-cron-v2', JSON.stringify(phases));
  }, [phases]);

  const allTasks = phases.flatMap(p => p.tasks);
  const donePct  = allTasks.length ? Math.round(allTasks.filter(t => t.done).length / allTasks.length * 100) : 0;

  /* mutations */
  const setTask = (tid, upd) => setPhases(ps => ps.map(p => ({
    ...p, tasks: p.tasks.map(t => t.id === tid ? { ...t, ...upd } : t)
  })));
  const setPhaseField = (pid, upd) => setPhases(ps => ps.map(p => p.id === pid ? { ...p, ...upd } : p));
  const deleteTask = (pid, tid) => setPhases(ps => ps.map(p =>
    p.id === pid ? { ...p, tasks: p.tasks.filter(t => t.id !== tid) } : p
  ));
  const addTask = (pid) => {
    const t = { id: uid(), name: 'Nova tarefa', members: [], s: 1, e: 2, done: false };
    setPhases(ps => ps.map(p => p.id === pid ? { ...p, tasks: [...p.tasks, t] } : p));
  };
  const toggleMember = (tid, mid) => setPhases(ps => ps.map(p => ({
    ...p, tasks: p.tasks.map(t => {
      if (t.id !== tid) return t;
      return { ...t, members: t.members.includes(mid) ? t.members.filter(m => m !== mid) : [...t.members, mid] };
    })
  })));

  /* drag */
  const startDrag = (tid, n) => { dragging.current = true; setDrag({ taskId: tid, anchor: n, current: n }); };
  const onOver    = (n) => { if (dragging.current) setDrag(d => d ? { ...d, current: n } : null); };
  const endDrag   = () => {
    if (drag && dragging.current) {
      setTask(drag.taskId, { s: Math.min(drag.anchor, drag.current), e: Math.max(drag.anchor, drag.current) });
    }
    dragging.current = false; setDrag(null);
  };

  return (
    <div onMouseUp={endDrag} onMouseLeave={endDrag}>
      {/* ── HEADER ── */}
      <header className="app-header" ref={headerRef}>
        <div className="header-left">
          <div className="project-label">Projeto STEAM · 2.ª Série · 2.º Trimestre 2026</div>
          <div className="project-title">Cadeira de Rodas de Baixo Custo para Cães Paraplégicos</div>
          <div className="project-sub">24 de abril → 26 de setembro de 2026 · Por aula/encontro</div>
          <div className="progress-row">
            <div className="progress-track">
              <div className="progress-fill" style={{ width: donePct + '%' }}></div>
            </div>
            <span className="progress-label">{donePct}%</span>
            <span className="progress-count">{allTasks.filter(t=>t.done).length}/{allTasks.length} tarefas concluídas</span>
          </div>
        </div>
        <div className="header-right">
          <div className="legend-title">Equipe</div>
          <div className="legend">
            {MEMBERS.map(m => (
              <span key={m.id} className="legend-chip" style={{ background: m.color }}>
                {m.label}
              </span>
            ))}
          </div>
        </div>
      </header>

      {/* ── TOOLBAR ── */}
      <div className="toolbar" ref={toolbarRef}>
        <button className="btn" onClick={() => window.print()}>⎙ Imprimir / PDF</button>
        <button className="btn btn-danger" onClick={() => {
          if (confirm('Restaurar dados originais? Todas as edições serão perdidas.')) setPhases(INITIAL);
        }}>↩ Restaurar</button>
        <span className="toolbar-hint">
          ✏ Clique no nome para editar &nbsp;·&nbsp; ☐ Marque tarefas concluídas &nbsp;·&nbsp; ←→ Arraste nas semanas para ajustar o período &nbsp;·&nbsp; 👤 Clique nos membros para atribuir
        </span>
      </div>

      {/* ── TABLE ── */}
      <div className="table-outer">
        <table className="gantt-table">
          <thead>
            {/* Month row */}
            <tr>
              <th className="th-spacer col-check" rowSpan={2}></th>
              <th className="th-left-cell col-task" rowSpan={2}>Tarefa</th>
              <th className="th-left-cell col-members" rowSpan={2}>Responsáveis</th>
              {MONTH_GROUPS.map(g => (
                <th key={g.month} className={`th-month-cell${g.isVacation ? ' vac-month' : ''}`} colSpan={g.count}>
                  {g.month}{g.isVacation ? ' ✦ Recesso' : ''}
                </th>
              ))}
            </tr>
            {/* Week row */}
            <tr>
              {WEEKS.map(w => (
                <th key={w.n} className={[
                  'th-week-cell',
                  w.isVacation ? 'vacation' : '',
                  w.n === TODAY_WEEK ? 'today-col' : '',
                ].filter(Boolean).join(' ')}>
                  {w.label}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {phases.map((phase, pi) => (
              <React.Fragment key={phase.id}>
                {pi > 0 && <tr className="gap-row">{Array.from({length: 3 + WEEKS.length}, (_,i) => <td key={i}></td>)}</tr>}

                {/* Phase header */}
                <tr className="phase-row" style={{ background: phase.color }}>
                  <td className="col-check" style={{ background: phase.color }}></td>
                  <td className="col-task" style={{ background: phase.color }}>
                    <input
                      className="phase-name-input"
                      value={phase.name}
                      onChange={e => setPhaseField(phase.id, { name: e.target.value })}
                      title="Clique para renomear a fase"
                    />
                  </td>
                  <td className="col-members" style={{ background: phase.color }}></td>
                  {WEEKS.map(w => (
                    <td key={w.n} style={{
                      background: w.isVacation ? 'rgba(0,0,0,0.12)' : hexToRgba(phase.color, 0.85),
                      padding: 0,
                    }}></td>
                  ))}
                </tr>

                {/* Tasks */}
                {phase.tasks.map(task => {
                  const isDP  = drag && drag.taskId === task.id;
                  const effS  = isDP ? Math.min(drag.anchor, drag.current) : task.s;
                  const effE  = isDP ? Math.max(drag.anchor, drag.current) : task.e;
                  return (
                    <tr key={task.id} className={`task-row${task.done ? ' done' : ''}`}>
                      <td className="check-cell col-check">
                        <input type="checkbox" checked={task.done}
                          onChange={e => setTask(task.id, { done: e.target.checked })} />
                      </td>
                      <td className="name-cell col-task">
                        <div className="name-row">
                          <textarea
                            className="task-name"
                            value={task.name}
                            rows={1}
                            onChange={e => {
                              e.target.style.height = 'auto';
                              e.target.style.height = e.target.scrollHeight + 'px';
                              setTask(task.id, { name: e.target.value });
                            }}
                            onFocus={e => {
                              e.target.style.height = 'auto';
                              e.target.style.height = e.target.scrollHeight + 'px';
                            }}
                            title="Clique para editar"
                          />
                          <button className="del-btn" onClick={() => deleteTask(phase.id, task.id)} title="Remover tarefa">✕</button>
                        </div>
                      </td>
                      <td className="members-cell col-members">
                        <div className="member-chips">
                          {MEMBERS.map(m => (
                            <span
                              key={m.id}
                              className={`m-chip${task.members.includes(m.id) ? '' : ' off'}`}
                              style={{ background: m.color }}
                              onClick={() => toggleMember(task.id, m.id)}
                              title={task.members.includes(m.id) ? `Remover ${m.label}` : `Atribuir ${m.label}`}
                            >{m.label}</span>
                          ))}
                        </div>
                      </td>
                      {WEEKS.map(w => {
                        const inR = w.n >= effS && w.n <= effE;
                        const isS = w.n === effS, isE = w.n === effE;
                        const alone = effS === effE;
                        let cls = 'gantt-bar';
                        if (alone) cls += ' bar-alone';
                        else if (isS) cls += ' bar-start';
                        else if (isE) cls += ' bar-end';
                        if (task.done) cls += ' is-done';
                        if (isDP) cls += ' is-drag';
                        return (
                          <td
                            key={w.n}
                            className={[
                              'gantt-cell',
                              tweaks?.showVacation && w.isVacation ? 'vacation' : '',
                              w.n === TODAY_WEEK ? 'today-col' : '',
                            ].filter(Boolean).join(' ')}
                            onMouseDown={() => !w.isVacation && startDrag(task.id, w.n)}
                            onMouseEnter={() => onOver(w.n)}
                          >
                            {inR && (
                              <div className={cls} style={{
                                background: hexToRgba(phase.color, task.done ? 0.3 : 0.75),
                              }}></div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}

                {/* Add task */}
                <tr className="add-row">
                  <td className="col-check"></td>
                  <td className="col-task">
                    <button className="add-btn" onClick={() => addTask(phase.id)}>+ Adicionar tarefa</button>
                  </td>
                  <td className="col-members"></td>
                  {WEEKS.map(w => <td key={w.n}></td>)}
                </tr>
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      {/* ── TWEAKS ── */}
      <TweaksPanel>
        <TweakSection label="Aparência">
          <TweakToggle label="Modo escuro"          value={tweaks?.darkMode}     onChange={v => setTweaks('darkMode', v)} />
          <TweakToggle label="Linhas compactas"     value={tweaks?.compactRows}  onChange={v => setTweaks('compactRows', v)} />
          <TweakToggle label="Mostrar recesso (Jul)" value={tweaks?.showVacation} onChange={v => setTweaks('showVacation', v)} />
        </TweakSection>
        <TweakSection label="Tamanho das células">
          <TweakSlider label="Zoom semanas (+/- auto)" value={tweaks?.cellWidth ?? 0} min={-20} max={20} step={2} onChange={v => setTweaks('cellWidth', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
