<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma STEAM — Cadeira de Rodas para Cães</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Firebase Realtime Database -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --border: #e2e0db;
      --border-strong: #ccc9c0;
      --text: #1c1c1c;
      --text-dim: #888580;
      --accent: #3d6fa8;
      --cell-w: 36px;
      --row-h: 42px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body.dark {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #2e2e2e;
      --border-strong: #444;
      --text: #e8e6e0;
      --text-dim: #666;
      --accent: #6b9fd4;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px 14px;
      display: flex;
      align-items: flex-start;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .header-left { flex: 1; min-width: 280px; }
    .project-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }
    .project-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    .project-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .progress-track { height: 5px; border-radius: 3px; background: var(--border); width: 160px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
    .progress-label { font-size: 11px; font-weight: 600; color: var(--accent); }
    .progress-count { font-size: 11px; color: var(--text-dim); }
    .legend-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    .legend { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .legend-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600; color: #fff; user-select: none;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 28px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      position: sticky; top: var(--header-h, 104px); z-index: 99;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 6px;
      font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg); }
    .btn-danger:hover { color: #c0392b; border-color: #c0392b; }
    .btn-active { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .btn-active:hover { opacity: 0.88; }
    .toolbar-hint { margin-left: auto; font-size: 11px; color: var(--text-dim); }

    /* Sync indicator */
    .sync-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sync-online     { background: #22c55e; }
    .sync-connecting { background: #f59e0b; animation: blink 1s ease-in-out infinite; }
    .sync-syncing    { background: #f59e0b; animation: blink 0.5s ease-in-out infinite; }
    .sync-offline    { background: #ef4444; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Edit dates banner */
    .edit-banner {
      background: #eff6ff; border-bottom: 1px solid #bfdbfe;
      padding: 6px 28px; font-size: 11px; color: #1d4ed8;
      display: flex; align-items: center; gap: 8px;
      position: sticky; top: var(--toolbar-bottom, 148px); z-index: 98;
    }
    body.dark .edit-banner { background: #1a2740; border-color: #2d4a6e; color: #93c5fd; }

    /* ── TABLE ── */
    .table-outer { overflow-x: auto; overflow-y: auto; height: calc(100vh - var(--sticky-offset, 148px)); }
    .gantt-table { border-collapse: separate; border-spacing: 0; min-width: max-content; }
    .gantt-table th, .gantt-table td { border-bottom: 1px solid var(--border); }

    /* Sticky left columns */
    .col-check   { width: 40px;  min-width: 40px;  position: sticky; left: 0;   z-index: 6; }
    .col-task    { width: 300px; min-width: 300px; position: sticky; left: 40px; z-index: 6; }
    .col-members { width: 168px; min-width: 168px; position: sticky; left: 340px; z-index: 6; border-right: 2px solid var(--border-strong) !important; }

    /* Column headers */
    .th-spacer { background: var(--surface); position: sticky; top: 0; z-index: 12; }
    .th-month-cell {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-dim); padding: 8px 0 2px; text-align: center;
      background: var(--surface); position: sticky; top: 0; z-index: 8;
    }
    .th-month-cell.vac-month { color: #c0973a; }
    .th-week-cell {
      font-size: 10px; font-weight: 400; color: var(--text-dim);
      padding: 2px 0 7px; text-align: center;
      width: var(--cell-w); min-width: var(--cell-w);
      background: var(--surface); white-space: nowrap;
      position: sticky; top: 28px; z-index: 8;
    }
    .th-week-cell.vacation { background: #fdf7ed; color: #c0973a; }
    body.dark .th-week-cell.vacation { background: #211e17; }
    .th-week-cell.today-col { color: var(--accent); font-weight: 700; }
    .th-left-cell {
      padding: 8px 10px 7px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim);
      background: var(--surface); position: sticky; top: 0; z-index: 12;
    }

    /* Phase header */
    .phase-row td { padding: 7px 10px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.9); }
    .phase-name-input { background: transparent; border: none; outline: none; font: inherit; color: inherit; cursor: pointer; width: 100%; }
    .phase-name-input:focus { cursor: text; border-bottom: 1px solid rgba(255,255,255,0.5); }

    /* Task rows */
    .task-row { transition: background 0.1s; }
    .task-row:hover { background: rgba(61,111,168,0.04); }
    body.dark .task-row:hover { background: rgba(107,159,212,0.06); }
    .task-row.done .task-name { text-decoration: line-through; color: var(--text-dim); }

    .check-cell { text-align: center; padding: 0 6px; vertical-align: middle; cursor: pointer; background: var(--surface); }
    .check-cell input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); margin: 0; }
    .name-cell { padding: 8px; background: var(--surface); vertical-align: middle; }
    .name-row { display: flex; align-items: center; gap: 4px; }
    .task-name {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
      cursor: pointer; padding: 0; line-height: 1.4;
      resize: none; overflow: hidden; display: block; width: 100%;
    }
    .task-name:focus { cursor: text; }
    .del-btn {
      opacity: 0; border: none; background: none; cursor: pointer;
      color: var(--text-dim); font-size: 13px; padding: 4px 5px; border-radius: 4px;
      transition: opacity 0.12s, color 0.12s; flex-shrink: 0; font-family: 'DM Sans', sans-serif;
    }
    .task-row:hover .del-btn { opacity: 0.4; }
    .del-btn:hover { opacity: 1 !important; color: #c0392b; }

    .members-cell { padding: 0 8px; background: var(--surface); vertical-align: middle; }
    .member-chips { display: flex; flex-wrap: wrap; gap: 3px; padding: 6px 0; }
    .m-chip { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity 0.12s, transform 0.1s; user-select: none; }
    .m-chip:hover { transform: scale(1.06); }
    .m-chip.off { opacity: 0.15; }

    /* Gantt cells */
    .gantt-cell {
      width: var(--cell-w); min-width: var(--cell-w);
      padding: 0; cursor: default; /* padrão: rolar */
      position: relative; min-height: var(--row-h); height: auto;
      vertical-align: middle; user-select: none;
    }
    .gantt-cell.edit-active { cursor: crosshair; }
    .gantt-cell.vacation {
      background: repeating-linear-gradient(135deg, transparent, transparent 4px, rgba(192,151,58,0.08) 4px, rgba(192,151,58,0.08) 8px);
    }
    body.dark .gantt-cell.vacation {
      background: repeating-linear-gradient(135deg, transparent, transparent 4px, rgba(192,151,58,0.12) 4px, rgba(192,151,58,0.12) 8px);
    }
    .gantt-cell.today-col::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
      width: 2px; transform: translateX(-50%);
      background: var(--accent); opacity: 0.3; pointer-events: none;
    }
    .gantt-bar { position: absolute; top: 8px; bottom: 8px; left: 2px; right: 2px; border-radius: 3px; pointer-events: none; }
    .gantt-bar.bar-start { left: 6px; border-radius: 8px 3px 3px 8px; }
    .gantt-bar.bar-end   { right: 6px; border-radius: 3px 8px 8px 3px; }
    .gantt-bar.bar-alone { left: 6px; right: 6px; border-radius: 8px; }
    .gantt-bar.is-done   { opacity: 0.35; }
    .gantt-bar.is-drag   { opacity: 0.55; }

    /* ── REORDER DRAG ── */
    .drag-handle {
      cursor: grab;
      color: var(--text-dim);
      opacity: 0;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px 2px 0;
      flex-shrink: 0;
      transition: opacity .12s;
      user-select: none;
      touch-action: none;
    }
    .task-row:hover .drag-handle { opacity: 0.45; }
    .drag-handle:hover            { opacity: 0.8 !important; }
    .drag-handle:active           { cursor: grabbing; }

    /* Linha de indicação de destino */
    .task-row.drop-top    > td { border-top:    2px solid var(--accent) !important; }
    .task-row.drop-bottom > td { border-bottom: 2px solid var(--accent) !important; }

    /* Tarefa sendo arrastada fica translúcida */
    .task-row.dragging-row { opacity: 0.35; }

    /* Cabeçalho de fase como zona de drop (soltar = mover p/ fim da fase) */
    .phase-row.drop-phase > td { box-shadow: inset 0 -3px 0 rgba(255,255,255,0.55); }

    /* Add task */
    .add-row td { padding: 3px 10px 4px; background: var(--surface); }
    .add-btn { width: 100%; text-align: left; padding: 5px 8px; background: none; border: 1px dashed var(--border); border-radius: 5px; font-size: 12px; color: var(--text-dim); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(61,111,168,0.04); }

    /* Vacation row */
    .vac-row td { background: #fdf7ed; text-align: center; font-size: 11px; color: #c0973a; padding: 6px 4px; }
    body.dark .vac-row td { background: #211e17; }

    /* Phase gap */
    .gap-row td { height: 4px; background: var(--bg); border: none; }

    /* ══════════════════════════════════════════════════
       MOBILE  ≤ 768 px
    ══════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      /* Header compacto */
      .app-header { padding: 12px 14px 10px; gap: 10px; }
      .project-label { font-size: 9px; letter-spacing: 1px; }
      .project-title { font-size: 15px; }
      .project-sub   { display: none; }
      .progress-track { width: 110px; }
      .progress-count { display: none; }
      .header-right { width: 100%; padding-top: 2px; }
      .legend-chip  { padding: 3px 9px; font-size: 11px; }

      /* Toolbar rola na horizontal, sem quebra de linha */
      .toolbar {
        padding: 7px 14px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 6px;
      }
      .toolbar::-webkit-scrollbar { display: none; }
      .toolbar-hint { display: none; }
      .btn { padding: 8px 11px; font-size: 12px; min-height: 38px; }

      /* Edit banner */
      .edit-banner { padding: 6px 14px; font-size: 10.5px; }

      /* Colunas fixas menores */
      .col-check   { width: 34px; min-width: 34px; }
      .col-task    { width: 190px; min-width: 190px; left: 34px; }
      .col-members { left: 224px; }

      /* Fonte menor nas tarefas */
      .task-name   { font-size: 12.5px; }
      .phase-row td { font-size: 9px; padding: 6px 8px; }
      .add-row td  { padding: 2px 6px 3px; }

      /* Chips de membros dentro da célula de tarefa (mobile) */
      .task-chips-mobile {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 4px;
      }
      .m-chip-sm {
        width: 20px; height: 20px; border-radius: 50%;
        font-size: 9px; font-weight: 700; color: #fff;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; user-select: none;
        transition: opacity .12s, transform .1s;
        flex-shrink: 0;
      }
      .m-chip-sm:active { transform: scale(1.12); }
      .m-chip-sm.off    { opacity: 0.18; }
    }

    /* ≤ 768 px: ocultar coluna de responsáveis */
    @media (max-width: 768px) {
      .col-members,
      th.col-members { display: none; }
      /* ajusta o sticky do col-task (sem o check: 34 px) */
      .col-task    { left: 34px; }
    }

    /* ≤ 480 px: coluna de tarefa ainda menor */
    @media (max-width: 480px) {
      .col-task    { width: 150px; min-width: 150px; }
      .project-title { font-size: 13px; }
      .legend-chip { padding: 3px 7px; font-size: 10px; }
    }

    /* Desktop: ocultar chips mobile dentro das células */
    @media (min-width: 769px) {
      .task-chips-mobile { display: none; }
    }

    @media print {
      .toolbar, .edit-banner, .del-btn, .add-btn { display: none !important; }
      .table-outer { overflow: visible !important; height: auto !important; }
      .app-header { position: static !important; }
      .th-month-cell, .th-week-cell, .th-left-cell, .th-spacer { position: static !important; }
      body { background: white !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ══════════════════════════════════════════════════
   TWEAKS PANEL (inline — sem dependência externa)
══════════════════════════════════════════════════ */
const __TWK = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:9999;width:272px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.92);color:#29261b;
    backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
    border:.5px solid rgba(255,255,255,.55);border-radius:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.2);font:12px/1.4 'DM Sans',sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none;border-bottom:.5px solid rgba(0,0,0,.06)}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.5);
    width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:14px;line-height:22px;text-align:center}
  .twk-x:hover{background:rgba(0,0,0,.07);color:#29261b}
  .twk-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
  .twk-sect{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(41,38,27,.4);padding-top:6px}
  .twk-sect:first-child{padding-top:0}
  .twk-row{display:flex;flex-direction:column;gap:4px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.7)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.45);font-variant-numeric:tabular-nums;font-size:11px}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:5px 0;border-radius:99px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:.5px solid rgba(0,0,0,.15);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:pointer}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:99px;background:rgba(0,0,0,.14);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.22);transition:transform .15s;display:block}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const set = React.useCallback((key, val) => setValues(prev => ({ ...prev, [key]: val })), []);
  return [values, set];
}

function TweaksPanel({ title = 'Aparência', children }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const pos = React.useRef({ x: 16, y: 16 });

  const clamp = React.useCallback(() => {
    const el = ref.current; if (!el) return;
    const maxX = Math.max(16, window.innerWidth  - el.offsetWidth  - 16);
    const maxY = Math.max(16, window.innerHeight - el.offsetHeight - 16);
    pos.current.x = Math.min(maxX, Math.max(16, pos.current.x));
    pos.current.y = Math.min(maxY, Math.max(16, pos.current.y));
    el.style.right  = pos.current.x + 'px';
    el.style.bottom = pos.current.y + 'px';
  }, []);

  React.useEffect(() => {
    const fn = e => {
      if (e?.data?.type === '__activate_edit_mode')   setOpen(true);
      if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', fn);
    return () => window.removeEventListener('message', fn);
  }, []);

  React.useEffect(() => { if (open) { clamp(); window.addEventListener('resize', clamp); return () => window.removeEventListener('resize', clamp); } }, [open, clamp]);

  const drag = e => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const ox = window.innerWidth - r.right - (e.clientX - r.right);
    const oy = window.innerHeight - r.bottom - (e.clientY - r.bottom);
    const move = ev => { pos.current = { x: pos.current.x - (ev.clientX - e.clientX), y: pos.current.y - (ev.clientY - e.clientY) }; e = ev; clamp(); };
    const up = () => { removeEventListener('mousemove', move); removeEventListener('mouseup', up); };
    addEventListener('mousemove', move); addEventListener('mouseup', up);
  };

  if (!open) return null;
  return <>
    <style>{__TWK}</style>
    <div ref={ref} className="twk-panel" style={{ right: pos.current.x, bottom: pos.current.y }}>
      <div className="twk-hd" onMouseDown={drag}>
        <b>{title}</b>
        <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  </>;
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span><span className="twk-val">{value > 0 ? '+' : ''}{value}{unit}</span></div>
      <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
    </div>
  );
}

function buildWeeks() {
  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const start = new Date(2026, 3, 24);
  return Array.from({ length: 23 }, (_, i) => {
    const d = new Date(start); d.setDate(d.getDate() + i * 7);
    return {
      n: i + 1,
      label: `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`,
      month: MONTHS[d.getMonth()],
      isVacation: d.getMonth() === 6,
      date: new Date(d),
    };
  });
}
const WEEKS = buildWeeks();

function getTodayWeek() {
  const now = new Date();
  for (let i = 0; i < WEEKS.length - 1; i++) {
    if (now >= WEEKS[i].date && now < WEEKS[i+1].date) return WEEKS[i].n;
  }
  return now >= WEEKS[WEEKS.length-1].date ? WEEKS[WEEKS.length-1].n : null;
}

function monthGroups() {
  const groups = [];
  WEEKS.forEach(w => {
    const last = groups[groups.length - 1];
    if (last && last.month === w.month) last.count++;
    else groups.push({ month: w.month, count: 1, isVacation: w.isVacation });
  });
  return groups;
}

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function App() {
  const [phases, setPhases] = useState(() => {
    try { const s = localStorage.getItem('steam-cron-v3'); return s ? JSON.parse(s) : INITIAL; }
    catch { return INITIAL; }
  });
  const [currentUser, setCurrentUser] = useState(() => {
    try { const s = localStorage.getItem('steam-cron-user'); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });
  const [editDates,   setEditDates]  = useState(false);
  const [drag,        setDrag]       = useState(null);
  const [syncStatus,  setSyncStatus] = useState(PHASES_REF ? 'connecting' : 'local');
  const [reorderDrag, setReorderDrag] = useState(null); // { taskId, phaseId }
  const [dropPos,     setDropPos]     = useState(null); // { phaseId, taskId, half }

  const dragging  = useRef(false);
  const headerRef = useRef(null);
  const toolbarRef= useRef(null);
  const bannerRef = useRef(null);
  const lastWrite = useRef(0);
  const phasesRef = useRef(phases);
  useEffect(() => { phasesRef.current = phases; }, [phases]);

  /* sticky heights */
  useEffect(() => {
    const upd = () => {
      const hh = headerRef.current?.offsetHeight  || 0;
      const th = toolbarRef.current?.offsetHeight || 0;
      const bh = bannerRef.current?.offsetHeight  || 0;
      document.documentElement.style.setProperty('--header-h',      hh + 'px');
      document.documentElement.style.setProperty('--toolbar-bottom',(hh + th) + 'px');
      document.documentElement.style.setProperty('--sticky-offset', (hh + th + bh) + 'px');
    };
    upd();
    window.addEventListener('resize', upd);
    return () => window.removeEventListener('resize', upd);
  }, [editDates]);

  /* tweaks */
  const [tweaks, setTweaks] = useTweaks({ darkMode: false, compactRows: false, showVacation: true, cellWidth: 0 });
  useEffect(() => {
    if (!tweaks) return;
    document.body.classList.toggle('dark', tweaks.darkMode);
    document.documentElement.style.setProperty('--row-h', tweaks.compactRows ? '32px' : '42px');
  }, [tweaks]);

  /* cell width */
  useEffect(() => {
    const upd = () => {
      const outer = document.querySelector('.table-outer');
      if (!outer) return;
      const avail = outer.clientWidth - 40 - 300 - 168 - 2;
      const auto  = Math.max(28, Math.floor(avail / 23));
      document.documentElement.style.setProperty('--cell-w', (auto + (tweaks?.cellWidth ?? 0)) + 'px');
    };
    upd();
    window.addEventListener('resize', upd);
    return () => window.removeEventListener('resize', upd);
  }, [tweaks?.cellWidth]);

  /* textarea auto-height */
  useEffect(() => {
    document.querySelectorAll('textarea.task-name').forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    });
  }, [phases]);

  /* ── Firebase: recebe edições dos outros integrantes ── */
  useEffect(() => {
    if (!PHASES_REF) return;
    const handler = snap => {
      if (Date.now() - lastWrite.current < 2000) return; /* ignora eco próprio */
      const raw = snap.val();
      if (!raw) return;
      try {
        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
        if (Array.isArray(data)) {
          setPhases(data);
          localStorage.setItem('steam-cron-v3', JSON.stringify(data));
          setSyncStatus('online');
        }
      } catch (e) { console.error('Firebase parse:', e); }
    };
    PHASES_REF.on('value', handler);
    setSyncStatus('online');
    return () => PHASES_REF.off('value', handler);
  }, []);

  /* ── mutate: salva local + envia para Firebase ── */
  const mutate = useCallback(updater => {
    const next = updater(phasesRef.current);
    setPhases(next);
    localStorage.setItem('steam-cron-v3', JSON.stringify(next));
    if (PHASES_REF) {
      lastWrite.current = Date.now();
      setSyncStatus('syncing');
      PHASES_REF.set(JSON.stringify(next))
        .then(()  => setSyncStatus('online'))
        .catch(() => setSyncStatus('offline'));
    }
  }, []);

  /* mutations */
  const setTask       = (tid, upd) => mutate(ps => ps.map(p => ({ ...p, tasks: p.tasks.map(t => t.id === tid ? { ...t, ...upd } : t) })));
  const setPhaseField = (pid, upd) => mutate(ps => ps.map(p => p.id === pid ? { ...p, ...upd } : p));
  const deleteTask    = (pid, tid) => mutate(ps => ps.map(p => p.id === pid ? { ...p, tasks: p.tasks.filter(t => t.id !== tid) } : p));
  const addTask       = pid => { const t = { id: uid(), name: 'Nova tarefa', members: [], s: 1, e: 2, done: false }; mutate(ps => ps.map(p => p.id === pid ? { ...p, tasks: [...p.tasks, t] } : p)); };
  const toggleMember  = (tid, mid) => mutate(ps => ps.map(p => ({ ...p, tasks: p.tasks.map(t => { if (t.id !== tid) return t; return { ...t, members: t.members.includes(mid) ? t.members.filter(m => m !== mid) : [...t.members, mid] }; }) })));

  /* drag (só ativo quando editDates = true) */
  const startDrag = (tid, n) => { dragging.current = true; setDrag({ taskId: tid, anchor: n, current: n }); };
  const onOver    = n => { if (dragging.current) setDrag(d => d ? { ...d, current: n } : null); };
  const endDrag   = () => {
    if (drag && dragging.current)
      setTask(drag.taskId, { s: Math.min(drag.anchor, drag.current), e: Math.max(drag.anchor, drag.current) });
    dragging.current = false; setDrag(null);
  };

  /* ── REORDER TASKS ── */
  const onRDragStart = useCallback((e, taskId, phaseId) => {
    setReorderDrag({ taskId, phaseId });
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
  }, []);

  const onRDragOver = useCallback((e, phaseId, taskId) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = e.currentTarget.getBoundingClientRect();
    const half = e.clientY < rect.top + rect.height / 2 ? 'top' : 'bottom';
    setDropPos(prev =>
      prev?.phaseId === phaseId && prev?.taskId === taskId && prev?.half === half
        ? prev : { phaseId, taskId, half }
    );
  }, []);

  const onRDrop = useCallback((e, targetPhaseId, targetTaskId) => {
    e.preventDefault();
    if (!reorderDrag) return;
    const half = dropPos?.half || 'bottom';

    let movedTask = null;
    let next = phasesRef.current.map(p => {
      if (p.id !== reorderDrag.phaseId) return p;
      movedTask = p.tasks.find(t => t.id === reorderDrag.taskId);
      return { ...p, tasks: p.tasks.filter(t => t.id !== reorderDrag.taskId) };
    });

    if (!movedTask) { setReorderDrag(null); setDropPos(null); return; }

    next = next.map(p => {
      if (p.id !== targetPhaseId) return p;
      if (targetTaskId === null) return { ...p, tasks: [...p.tasks, movedTask] };
      const idx = p.tasks.findIndex(t => t.id === targetTaskId);
      const at = half === 'top' ? idx : idx + 1;
      const tasks = [...p.tasks];
      tasks.splice(at, 0, movedTask);
      return { ...p, tasks };
    });

    mutate(() => next);
    setReorderDrag(null);
    setDropPos(null);
  }, [reorderDrag, dropPos, mutate]);

  const onRDragEnd = useCallback(() => { setReorderDrag(null); setDropPos(null); }, []);

  /* touch drag: move o dedo para arrastar datas no mobile */
  const handleTouchMove = useCallback(e => {
    if (!dragging.current || !editDates) return;
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const wn = parseInt(
      el?.getAttribute('data-week') ||
      el?.closest('[data-week]')?.getAttribute('data-week') || '0'
    );
    if (wn > 0) onOver(wn);
  }, [editDates, onOver]);

  const selectUser = m => {
    localStorage.setItem('steam-cron-user', JSON.stringify(m));
    setCurrentUser(m);
    setEditDates(false);
  };

  const allTasks = phases.flatMap(p => p.tasks);
  const donePct  = allTasks.length ? Math.round(allTasks.filter(t => t.done).length / allTasks.length * 100) : 0;

  const syncLabels = { online: 'Sincronizado', syncing: 'Sincronizando…', offline: 'Sem conexão', connecting: 'Conectando…', local: '' };

  return (
    <div onMouseUp={endDrag} onMouseLeave={endDrag} onTouchEnd={endDrag} onTouchCancel={endDrag} onTouchMove={handleTouchMove}>

      {!currentUser && <UserPicker onSelect={selectUser} />}

      {/* HEADER */}
      <header className="app-header" ref={headerRef}>
        <div className="header-left">
          <div className="project-label">Projeto STEAM · 2.ª Série · 2.º Trimestre 2026</div>
          <div className="project-title">Cadeira de Rodas de Baixo Custo para Cães Paraplégicos</div>
          <div className="project-sub">24 de abril → 26 de setembro de 2026 · Por aula/encontro</div>
          <div className="progress-row">
            <div className="progress-track"><div className="progress-fill" style={{ width: donePct + '%' }}></div></div>
            <span className="progress-label">{donePct}%</span>
            <span className="progress-count">{allTasks.filter(t => t.done).length}/{allTasks.length} tarefas concluídas</span>
          </div>
        </div>
        <div className="header-right">
          <div className="legend-title">Equipe</div>
          <div className="legend">
            {MEMBERS.filter(m => !m.teacher).map(m => <span key={m.id} className="legend-chip" style={{ background: m.color }}>{m.label}</span>)}
          </div>
          <div className="legend-title" style={{ marginTop: 8 }}>Professores</div>
          <div className="legend">
            {MEMBERS.filter(m => m.teacher).map(m => <span key={m.id} className="legend-chip" style={{ background: m.color }}>{m.label}</span>)}
          </div>
        </div>
      </header>

      {/* TOOLBAR */}
      <div className="toolbar" ref={toolbarRef}>
        <button className="btn" onClick={() => window.print()}>⎙ Imprimir</button>
        <button className="btn btn-danger" onClick={() => {
          if (confirm('Restaurar dados originais? Todas as edições serão perdidas.')) mutate(() => INITIAL);
        }}>↩ Restaurar</button>

        {/* ── BOTÃO EDITAR DATAS ── */}
        {currentUser && (
          <button
            className={`btn${editDates ? ' btn-active' : ''}`}
            onClick={() => setEditDates(v => !v)}
            title={editDates ? 'Desativar edição — rolar tabela livremente' : 'Ativar para arrastar e ajustar datas das tarefas'}
          >
            {editDates ? '🔓 Editando Datas' : '📅 Editar Datas'}
          </button>
        )}

        <button className="btn" onClick={() =>
          window.dispatchEvent(new MessageEvent('message', { data: { type: '__activate_edit_mode' } }))
        }>⚙ Aparência</button>

        {currentUser && (
          <button className="btn" onClick={() => { setCurrentUser(null); localStorage.removeItem('steam-cron-user'); setEditDates(false); }}
            title="Trocar usuário"
            style={{ display: 'flex', alignItems: 'center', gap: 6 }}
          >
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: currentUser.color, flexShrink: 0 }}></span>
            {currentUser.label}

        {syncStatus !== 'local' && (

              &nbsp;Clique em <strong>Editar Datas</strong> novamente para desativar e rolar a tabela normalmente.

              {MONTH_GROUPS.map(g => (
                <th key={g.month} className={`th-month-cell${g.isVacation ? ' vac-month' : ''}`} colSpan={g.count}>
                  {g.month}{g.isVacation ? ' ✦ Recesso' : ''}
                </th>
              ))}
            </tr>
            <tr>
              {WEEKS.map(w => (
                <th key={w.n} className={['th-week-cell', w.isVacation ? 'vacation' : '', w.n === TODAY_WEEK ? 'today-col' : ''].filter(Boolean).join(' ')}>
                  {w.label}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {phases.map((phase, pi) => (
              <React.Fragment key={phase.id}>
                {pi > 0 && <tr className="gap-row">{Array.from({ length: 3 + WEEKS.length }, (_, i) => <td key={i}></td>)}</tr>}

                {/* Cabeçalho da fase */}
                <tr
                  className={`phase-row${dropPos?.phaseId === phase.id && dropPos.taskId === null ? ' drop-phase' : ''}`}
                  style={{ background: phase.color }}
                  onDragOver={e => { e.preventDefault(); setDropPos({ phaseId: phase.id, taskId: null, half: 'bottom' }); }}
                  onDragLeave={() => setDropPos(null)}
                  onDrop={e => onRDrop(e, phase.id, null)}
                >
                  <td className="col-check"   style={{ background: phase.color }}></td>
                  <td className="col-task"    style={{ background: phase.color }}>
                    <input className="phase-name-input" value={phase.name}
                      onChange={e => setPhaseField(phase.id, { name: e.target.value })}
                      title="Clique para renomear" />
                  </td>
                  <td className="col-members" style={{ background: phase.color }}></td>
                  {WEEKS.map(w => (
                    <td key={w.n} style={{ background: w.isVacation ? 'rgba(0,0,0,0.12)' : rgba(phase.color, 0.85), padding: 0 }}></td>
                  ))}
                </tr>

                {/* Tarefas */}
                {phase.tasks.map(task => {
                  const isDP  = drag && drag.taskId === task.id;
                  const effS  = isDP ? Math.min(drag.anchor, drag.current) : task.s;
                  const effE  = isDP ? Math.max(drag.anchor, drag.current) : task.e;
                  return (
                    <tr key={task.id}
                      className={[
                        'task-row',
                        task.done ? 'done' : '',
                        reorderDrag?.taskId === task.id ? 'dragging-row' : '',
                        dropPos?.taskId === task.id && dropPos.half === 'top'    ? 'drop-top'    : '',
                        dropPos?.taskId === task.id && dropPos.half === 'bottom' ? 'drop-bottom' : '',
                      ].filter(Boolean).join(' ')}
                      onDragOver={e => onRDragOver(e, phase.id, task.id)}
                      onDragLeave={() => setDropPos(null)}
                      onDrop={e => onRDrop(e, phase.id, task.id)}
                    >
                      <td className="check-cell col-check">
                        <input type="checkbox" checked={task.done} onChange={e => setTask(task.id, { done: e.target.checked })} />
                      </td>
                      <td className="name-cell col-task">
                        <div className="name-row">
                          <span
                            className="drag-handle"
                            draggable
                            onDragStart={e => onRDragStart(e, task.id, phase.id)}
                            onDragEnd={onRDragEnd}
                            title="Arrastar para mover tarefa"
                          >⠿</span>
                          <textarea className="task-name" value={task.name} rows={1}
                            onChange={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; setTask(task.id, { name: e.target.value }); }}
                            onFocus={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                            title="Clique para editar" />
                          <button className="del-btn" onClick={() => deleteTask(phase.id, task.id)} title="Remover">✕</button>
                        </div>
                        {/* Chips circulares visíveis só no mobile (coluna de membros fica oculta) */}
                        <div className="task-chips-mobile">
                          {MEMBERS.map(m => (
                            <span key={m.id}
                              className={`m-chip-sm${task.members.includes(m.id) ? '' : ' off'}`}
                              style={{ background: m.color }}
                              onClick={() => toggleMember(task.id, m.id)}
                              title={task.members.includes(m.id) ? `Remover ${m.label}` : `Atribuir ${m.label}`}
                            >{m.label[0]}</span>
                          ))}
                        </div>
                      </td>
                      <td className="members-cell col-members">
                        <div className="member-chips">
                          {MEMBERS.map(m => (
                            <span key={m.id}
                              className={`m-chip${task.members.includes(m.id) ? '' : ' off'}`}
                              style={{ background: m.color }}
                              onClick={() => toggleMember(task.id, m.id)}
                              title={task.members.includes(m.id) ? `Remover ${m.label}` : `Atribuir ${m.label}`}
                            >{m.label}</span>
                          ))}
                        </div>
                      </td>
                      {WEEKS.map(w => {
                        const inR   = w.n >= effS && w.n <= effE;
                        const alone = effS === effE;
                        let cls = 'gantt-bar';
                        if (alone)       cls += ' bar-alone';
                        else if (w.n === effS) cls += ' bar-start';
                        else if (w.n === effE) cls += ' bar-end';
                        if (task.done)   cls += ' is-done';
                        if (isDP)        cls += ' is-drag';
                        return (
                          <td key={w.n}
                            data-week={w.n}
                            className={['gantt-cell', editDates ? 'edit-active' : '', tweaks?.showVacation && w.isVacation ? 'vacation' : '', w.n === TODAY_WEEK ? 'today-col' : ''].filter(Boolean).join(' ')}
                            onMouseDown={() => editDates && !w.isVacation && startDrag(task.id, w.n)}
                            onMouseEnter={() => editDates && onOver(w.n)}
                            onTouchStart={e => { if (editDates && !w.isVacation) { e.preventDefault(); startDrag(task.id, w.n); } }}
                          >
                            {inR && <div className={cls} style={{ background: rgba(phase.color, task.done ? 0.3 : 0.75) }}></div>}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}

                {/* Adicionar tarefa */}
                <tr className="add-row">
                  <td className="col-check"></td>
                  <td className="col-task"><button className="add-btn" onClick={() => addTask(phase.id)}>+ Adicionar tarefa</button></td>
                  <td className="col-members"></td>
                  {WEEKS.map(w => <td key={w.n}></td>)}
                </tr>
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      {/* PAINEL DE APARÊNCIA */}
      <TweaksPanel title="Aparência">
        <TweakSection label="Tema">
          <TweakToggle label="Modo escuro"           value={tweaks?.darkMode}     onChange={v => setTweaks('darkMode', v)} />
          <TweakToggle label="Linhas compactas"      value={tweaks?.compactRows}  onChange={v => setTweaks('compactRows', v)} />
          <TweakToggle label="Mostrar recesso (Jul)" value={tweaks?.showVacation} onChange={v => setTweaks('showVacation', v)} />
        </TweakSection>
        <TweakSection label="Zoom das semanas">
          <TweakSlider label="Largura das células" value={tweaks?.cellWidth ?? 0} min={-20} max={20} step={2} unit="px" onChange={v => setTweaks('cellWidth', v)} />
        </TweakSection>
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
