  <rect x="9"  y="13.8" width="16" height="4.5" rx="2.2" fill="#ffffff" opacity="0.95"/>
  <rect x="5"  y="20.5" width="10" height="4.5" rx="2.2" fill="#ffffff" opacity="0.95"/>

  <!-- Linha vertical de referência (hoje) -->
